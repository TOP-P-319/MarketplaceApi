name: marketplace-api-319
services:
  gateway-api:
    container_name: gateway-api-319
    image: nginx:alpine
    ports:
      - "6139:80"
    volumes:
      - ./GatewayAPI/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - products-api
      - purchases-api
      - users-api
    restart: unless-stopped
  
  users-api:
    container_name: users-api-319
    image: users-api-319
    build:
      context: .
      dockerfile: UsersAPI/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      DB_CONNECTION: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    expose:
      - "8080"
    depends_on:
      - migrations
    restart: unless-stopped
  
  purchases-api:
    container_name: purchases-api-319
    image: purchases-api-319
    build:
      context: .
      dockerfile: PurchasesAPI/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      DB_CONNECTION: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    expose:
      - "8080"
    depends_on:
      - migrations
    restart: unless-stopped
  
  products-api:
    container_name: products-api-319
    image: products-api-319
    build:
      context: .
      dockerfile: ProductsAPI/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      DB_CONNECTION: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    expose:
      - "8080"
    depends_on:
      - migrations
    restart: unless-stopped

  postgres:
    container_name: postgres-319
    image: postgres:alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    
  migrations:
    container_name: migrations-319
    image: migrations-319
    build:
      context: .
      dockerfile: Migrations/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      DB_CONNECTION: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - postgres
    restart: on-failure
  
volumes:
  postgres-data:
